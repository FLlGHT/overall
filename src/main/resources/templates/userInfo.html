<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User information</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<!--  User info block  -->
<div class="col-md-7 d-flex p-lg-5 mx-auto my-5">
    <!--  User profile picture  -->
    <svg class="bd-placeholder-img rounded-circle" width="300" height="300" xmlns="http://www.w3.org/2000/svg"
         role="img"
         aria-label="Placeholder: 140x140" preserveAspectRatio="xMidYMid slice" focusable="false"><title>
        Placeholder</title>
        <rect width="100%" height="100%" fill="#777"></rect>
        <text x="50%" y="50%" fill="#777" dy=".3em">140x140</text>
    </svg>
    <!--  User profile info  -->
    <div class="my-lg-3 pl-sm-5" th:each="user : ${userData}">
        <p class="display-4 fw-normal" th:text="${user.username}"></p>
        <p class="lead fw-normal my-sm-0" th:text="${user.firstName} + ' ' + ${user.secondName}"></p>
        <p class="lead fw-normal my-sm-0" th:text="${user.getFormattedBirthday()} + ' (' + ${user.getAge() + ')'}"></p>
        <p class="lead fw-normal my-sm-0" th:text="${user.about}"></p>
        <!--  User link list  -->
        <div class="my-sm-2">
            <div th:each="link : ${user.userLinks}">
                <a class="lead fw-normal my-sm-0" th:href="${link.getFullLink()}" th:text="${link.getShortLink()}"></a>
            </div>
        </div>
    </div>
</div>

<!--  User post list block  -->
<div class="container marketing" th:each="post :${posts}">
    <hr class="featurette-divider">

    <!--  User post text  -->
    <div class="row featurette">
        <div class="col-md-7">
            <h2 class="featurette-heading" th:text="${post.header}">
                <span class="text-muted" th:text="${post.date}"></span></h2>
            <p class="lead" th:text="${post.text}"></p>
        </div>
        <!--  User post picture  -->
        <div class="col-md-5">
            <svg class="bd-placeholder-img bd-placeholder-img-lg featurette-image img-fluid mx-auto" width="500"
                 height="500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder: 500x500"
                 preserveAspectRatio="xMidYMid slice" focusable="false"><title>Placeholder</title>
                <rect width="100%" height="100%" fill="#eee"></rect>
                <text x="50%" y="50%" fill="#aaa" dy=".3em">500x500</text>
            </svg>
        </div>
    </div>
    <hr class="featurette-divider">
</div>


<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
</body>
</body>
</html>
