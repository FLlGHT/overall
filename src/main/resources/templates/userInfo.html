<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User information</title>
</head>
<body>
<h3>It's user information</h3>
<div>
    <div th:each="data : ${userData}">
        <p th:text="${data.getUsername()}"></p>
        <p th:text="${data.getFirstName()} + ' ' + ${data.getSecondName()}"></p>
        <p th:text="${data.getBirthday()} + ' ' + ${data.getAge()}"></p>
    </div>
</div>
</body>
</html>
