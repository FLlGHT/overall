<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User information</title>
</head>
<body>
<h3>It's user information</h3>
<div>
    <p th:text="${userData.getUsername()}">
    </p>
    <p th:text="${userData.getFirstName()} + ' ' + ${userData.getSecondName()}">
    </p>
    <p th:text="${userData.getBirthday()} + ' ' + ${userData.getAge()}"></p>
</div>
</body>
</html>
